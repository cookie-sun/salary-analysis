            uploadBtn.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', function(e) {
                const file = this.files[0];
                if (!file) return;

                fileInfo.textContent = '📄 ' + file.name;
                fileInfo.className = 'file-info loaded';

                const reader = new FileReader();
                reader.onload = function(loadEvent) {
                    try {
                        const data = new Uint8Array(loadEvent.target.result);
                        const workbook = XLSX.read(data, { type: 'array', cellFormula: true, cellNF: true,
                            cellText: true });
                        let sheetName = null;
                        const sheets = workbook.SheetNames;
                        for (let name of sheets) {
                            if (name.includes('总表') || name.includes('工资') || name.includes('薪资')) {
                                sheetName = name;
                                break;
                            }
                        }
                        if (!sheetName) sheetName = sheets[0];
                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '', raw: false });

                        const parsed = parsePayrollData(jsonData);
                        if (parsed && parsed.employees.length > 0) {
                            currentTableMonth = parsed.month || '';
                            destroyAllCharts();
                            renderDashboard(parsed);
                            fileInfo.textContent = '✅ ' + file.name + ' (' + parsed.employees.length + '人)';
                        } else {
                            alert('未能从表格中识别到有效的人员数据，请确保表头包含"姓名"列。');
                            fileInfo.textContent = '❌ ' + file.name + ' (解析失败)';
                            fileInfo.className = 'file-info';
                        }
                    } catch (err) {
                        alert('解析文件时出错：' + err.message);
                        fileInfo.textContent = '❌ ' + file.name + ' (解析失败)';
                        fileInfo.className = 'file-info';
                    }
                };
                reader.readAsArrayBuffer(file);
                this.value = '';
            });

            // ============================================================
            // 主渲染函数
            // ============================================================
            function renderDashboard(data) {
                if (isRendering) return;
                isRendering = true;

                try {
                    const { employees, totalSalary, totalSocialCompany, totalFundCompany, totalCost, month } = data;
                    currentEmployees = employees;
                    currentTotalSalary = totalSalary;
                    currentTotalSocial = totalSocialCompany;
                    currentTotalFund = totalFundCompany;
                    currentTotalCost = totalCost;

                    const titleMonth = month || '2026年5月';
                    document.getElementById('pageTitle').textContent = titleMonth + '人力成本数据分析表';

                    const deptMap = new Map();
                    employees.forEach(e => {
                        const d = e.dept || '未分类';
                        if (!deptMap.has(d)) deptMap.set(d, { count: 0, salary: 0, cost: 0, fixed: 0, float: 0 });
                        const info = deptMap.get(d);
                        info.count += 1;
                        info.salary += e.salary;
                        info.cost += e.salary + e.socialCompany + e.fundCompany;
                        info.fixed += e.fixedPay;
                        info.float += e.floatPay;
                    });
                    const deptNames = Array.from(deptMap.keys());
                    const deptCosts = deptNames.map(d => Math.round(deptMap.get(d).cost));
                    const deptSalaries = deptNames.map(d => Math.round(deptMap.get(d).salary));
                    const deptCounts = deptNames.map(d => deptMap.get(d).count);
                    const deptPerCapita = {};
                    deptNames.forEach(d => {
                        const emps = employees.filter(e => e.dept === d);
                        const total = emps.reduce((sum, e) => sum + e.salary + e.socialCompany + e.fundCompany, 0);
                        deptPerCapita[d] = emps.length > 0 ? Math.round(total / emps.length) : 0;
                    });

                    currentDeptNames = deptNames;
                    currentDeptCosts = deptCosts;
                    currentDeptCounts = deptCounts;
                    currentDeptPerCapita = deptPerCapita;

                    // 岗位类型统计
                    const postTypeMap = {};
                    const postTypeSalaryMap = {};
                    employees.forEach(e => {
                        const type = e.type || '—';
                        if (!postTypeMap[type]) postTypeMap[type] = 0;
                        postTypeMap[type] += 1;
                        if (!postTypeSalaryMap[type]) postTypeSalaryMap[type] = 0;
                        postTypeSalaryMap[type] += e.salary;
                    });
                    currentPostTypeData = Object.keys(postTypeSalaryMap).map(key => ({
                        name: key,
                        value: Math.round(postTypeSalaryMap[key])
                    }));

                    let fixedTotal = 0,
                        floatTotal = 0;
                    employees.forEach(e => { fixedTotal += e.fixedPay;
                        floatTotal += e.floatPay; });
                    currentFixedTotal = fixedTotal;
                    currentFloatTotal = floatTotal;

                    const totalPay = fixedTotal + floatTotal;
                    const fixedRatio = totalPay > 0 ? (fixedTotal / totalPay * 100) : 0;
                    const floatRatio = totalPay > 0 ? (floatTotal / totalPay * 100) : 0;
                    const explicitCost = Math.round(totalSalary);
                    const implicitCost = Math.round(totalSocialCompany + totalFundCompany);
                    currentExplicitCost = explicitCost;
                    currentImplicitCost = implicitCost;
                    const explicitRatio = totalCost > 0 ? (explicitCost / totalCost * 100) : 0;
                    const implicitRatio = totalCost > 0 ? (implicitCost / totalCost * 100) : 0;
                    const headcount = employees.length;

                    // 统计最大值
                    const maxDept = deptNames.reduce((a, b) => deptCounts[deptNames.indexOf(a)] > deptCounts[deptNames
                        .indexOf(b)] ? a : b, deptNames[0] || '');
                    const maxDeptCount = maxDept ? deptCounts[deptNames.indexOf(maxDept)] : 0;
                    const maxSalary = employees.reduce((max, e) => e.salary > max ? e.salary : max, 0);
                    const maxSalaryEmp = employees.find(e => e.salary === maxSalary);

                    document.getElementById('emptyState').classList.add('hidden');
                    document.getElementById('analysisContent').classList.remove('hidden');
                    document.getElementById('dataSource').textContent = data.source + ' · ' + new Date().toLocaleString();

                    // ============================================================
                    // 核心指标卡片
                    // ============================================================
                    const statsGrid = document.getElementById('statsGrid');
                    const avgCost = headcount > 0 ? totalCost / headcount : 0;
                    const avgSalary = headcount > 0 ? totalSalary / headcount : 0;

                    statsGrid.innerHTML = `
                            <div class="card card-cost" data-scenario="costStructure">
                                <div class="card-title">📊 成本总量</div>
                                <div class="card-item" data-scenario="costStructure">
                                    <div class="item-label">人力总成本（应发+公司社保+公司公积金）</div>
                                    <div class="item-value">${formatCurrency(totalCost)}</div>
                                    <div class="item-desc">应发 ${formatCurrency(totalSalary)} + 社保 ${formatCurrency(totalSocialCompany)} + 公积金 ${formatCurrency(totalFundCompany)}</div>
                                </div>
                                <div class="card-item" data-scenario="employeeList">
                                    <div class="item-label">在册统计总人数</div>
                                    <div class="item-value">${headcount} 人</div>
                                    <div class="item-desc">点击查看全部员工名单</div>
                                </div>
                                <div class="card-item" data-scenario="costStructure">
                                    <div class="item-label">人均人力成本</div>
                                    <div class="item-value">${formatCurrency(avgCost)}</div>
                                    <div class="item-desc">总成本 ÷ ${headcount} 人</div>
                                </div>
                            </div>
                            <div class="card card-structure" data-scenario="fixedPay">
                                <div class="card-title">📊 成本结构</div>
                                <div class="card-item" data-scenario="fixedPay">
                                    <div class="item-label">固定薪酬（基本工资+岗位工资）</div>
                                    <div class="item-value">${formatCurrency(fixedTotal)}</div>
                                    <div class="item-desc">基本 ${formatCurrency(employees.reduce((s,e)=>s+e.base,0))} + 岗位 ${formatCurrency(employees.reduce((s,e)=>s+e.post,0))}</div>
                                </div>
                                <div class="card-item" data-scenario="floatPay">
                                    <div class="item-label">浮动薪酬（绩效+补贴+提成）</div>
                                    <div class="item-value">${formatCurrency(floatTotal)}</div>
                                    <div class="item-desc">绩效 ${formatCurrency(employees.reduce((s,e)=>s+e.perf,0))} + 补贴 ${formatCurrency(employees.reduce((s,e)=>s+e.fullAttendance+e.overtime+e.travel+e.otherSubsidy,0))}</div>
                                </div>
                                <div class="card-item" data-scenario="fixedFloatRatio">
                                    <div class="item-label">薪酬固浮比</div>
                                    <div class="item-value">${formatRatio(fixedTotal, floatTotal)}</div>
                                    <div class="item-desc">${fixedRatio > 80 ? '刚性偏高' : '结构合理'}</div>
                                </div>
                                <div class="card-item" data-scenario="socialFund">
                                    <div class="item-label">企业社保公积金合计</div>
                                    <div class="item-value">${formatCurrency(totalSocialCompany + totalFundCompany)}</div>
                                    <div class="item-desc">公司社保 + 公司公积金</div>
                                </div>
                            </div>
                            <div class="card card-effectiveness" data-scenario="avgSalary">
                                <div class="card-title">📈 组织效能</div>
                                <div class="card-item" data-scenario="avgSalary">
                                    <div class="item-label">人均应发工资</div>
                                    <div class="item-value">${formatCurrency(avgSalary)}</div>
                                    <div class="item-desc">应发总额 ÷ ${headcount} 人</div>
                                </div>
                                <div class="card-item" data-scenario="salaryRatio">
                                    <div class="item-label">薪酬占人力总成本</div>
                                    <div class="item-value">${(totalSalary/totalCost*100).toFixed(2)}%</div>
                                    <div class="item-desc">点击查看每人占比明细</div>
                                </div>
                                <div class="card-item" data-scenario="socialFundRatio">
                                    <div class="item-label">企业社保公积金占比</div>
                                    <div class="item-value">${((totalSocialCompany+totalFundCompany)/totalCost*100).toFixed(2)}%</div>
                                    <div class="item-desc">点击查看每人占比明细</div>
                                </div>
                            </div>
                            <div class="card card-distribution" data-scenario="distribution">
                                <div class="card-title">👥 编制分布</div>
                                <div class="card-item" data-scenario="deptList">
                                    <div class="item-label">部门总数</div>
                                    <div class="item-value">${deptNames.length} 个部门</div>
                                    <div class="item-desc">点击查看全部部门</div>
                                </div>
                                <div class="card-item" data-scenario="maxDept">
                                    <div class="item-label">人数最多部门</div>
                                    <div class="item-value">${maxDept} ${maxDeptCount} 人</div>
                                    <div class="item-desc">含全职、兼职、实习、当月离职</div>
                                </div>
                                <div class="card-item" data-scenario="postType">
                                    <div class="item-label">岗位类型</div>
                                    <div class="item-value">${Object.keys(postTypeMap).join(' / ')}</div>
                                    <div class="item-desc">点击查看各岗位人数</div>
                                </div>
                                <div class="card-item" data-scenario="maxSalary">
                                    <div class="item-label">单人最高应发</div>
                                    <div class="item-value">${formatCurrency(maxSalary)}</div>
                                    <div class="item-desc">${maxSalaryEmp ? maxSalaryEmp.name + ' · ' + maxSalaryEmp.dept : ''}</div>
                                </div>
                            </div>
                        `;

                    // ============================================================
                    // 卡片点击事件
                    // ============================================================
                    document.querySelectorAll('.card-item, .card-title').forEach(el => {
                        el.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const scenario = this.dataset.scenario;
                            if (!scenario) return;

                            // 成本总量
                            if (scenario === 'costStructure') {
                                openCostTotalDetail(employees, headcount, totalCost, totalSalary,
                                    totalSocialCompany, totalFundCompany);
                                return;
                            }

                            // 薪酬固浮比
                            if (scenario === 'fixedFloatRatio') {
                                openFixedFloatRatioDetail(employees, fixedTotal, floatTotal);
                                return;
                            }

                            // 企业社保公积金合计
                            if (scenario === 'socialFund') {
                                openSocialFundDetail(employees);
                                return;
                            }

                            // 人均应发工资
                            if (scenario === 'avgSalary') {
                                openAvgSalaryDetail(employees, avgSalary, totalSalary);
                                return;
                            }

                            // 在册统计总人数
                            if (scenario === 'employeeList') {
                                openEmployeeListDetail(employees);
                                return;
                            }

                            // 薪酬占个人人力总成本比例
                            if (scenario === 'salaryRatio') {
                                openSalaryRatioDetail(employees, totalCost);
                                return;
                            }

                            // 公司社保公积金占个人人力总成本比例
                            if (scenario === 'socialFundRatio') {
                                openSocialFundRatioDetail(employees, totalCost);
                                return;
                            }

                            // 部门总数
                            if (scenario === 'deptList') {
                                openDeptListDetail(deptNames);
                                return;
                            }

                            // 人数最多部门
                            if (scenario === 'maxDept') {
                                openMaxDeptDetail(deptNames, deptCounts, maxDept, maxDeptCount);
                                return;
                            }

                            // 岗位类型
                            if (scenario === 'postType') {
                                openPostTypeDetail(postTypeMap);
                                return;
                            }

                            // 单人最高应发
                            if (scenario === 'maxSalary') {
                                openMaxSalaryDetail(employees, maxSalary, maxSalaryEmp);
                                return;
                            }

                            // 其他常规场景
                            const scenarioTitles = {
                                'fixedPay': '📊 成本结构明细',
                                'floatPay': '📈 组织效能明细',
                                'distribution': '👥 编制分布明细',
                                'full': '📋 完整明细'
                            };

                            const scenarioSummaries = {
                                'fixedPay': `固定薪酬 ${formatCurrency(fixedTotal)} · 浮动薪酬 ${formatCurrency(floatTotal)} · 固浮比 ${formatRatio(fixedTotal, floatTotal)} · 共 ${headcount} 人`,
                                'floatPay': `人均应发 ${formatCurrency(avgSalary)} · 薪酬占比 ${(totalSalary/totalCost*100).toFixed(1)}% · 社保公积金占比 ${((totalSocialCompany+totalFundCompany)/totalCost*100).toFixed(1)}% · 共 ${headcount} 人`,
                                'distribution': `${deptNames.length} 个部门 · 最多 ${maxDept} ${maxDeptCount}人 · 岗位类型 ${Object.keys(postTypeMap).join('/')} · 共 ${headcount} 人`
                            };

                            const title = scenarioTitles[scenario] || '📋 明细';
                            const summary = scenarioSummaries[scenario] || `共 ${headcount} 人`;
                            const columns = getColumnsForScenario(scenario);
                            let dataForModal = employees;

                            if (scenario === 'costStructure') {
                                dataForModal = employees.map(e => ({
                                    ...e,
                                    totalCost: e.salary + e.socialCompany + e.fundCompany
                                }));
                            }

                            openModalWithColumns(title, dataForModal, summary, columns);
                        });
                    });

                    // ============================================================
                    // 预警模块
                    // ============================================================
                    const maxDeptCost = Math.max(...deptCosts);
                    const maxDeptIndex = deptCosts.indexOf(maxDeptCost);
                    const maxDeptName = deptNames[maxDeptIndex] || '未知部门';
                    const totalDeptCost = deptCosts.reduce((a, b) => a + b, 0);
                    const deptCostRatio = totalDeptCost > 0 ? (maxDeptCost / totalDeptCost * 100) : 0;

                    const overallAvg = employees.reduce((sum, e) => sum + e.salary + e.socialCompany + e.fundCompany, 0) /
                        employees.length;
                    let outlierDepts = [];
                    deptNames.forEach(d => {
                        if (deptPerCapita[d] > overallAvg * 1.3) outlierDepts.push(d);
                    });

                    let costStatus = 'warn-green',
                        costIcon = '✅',
                        costKeyword = '分布均衡',
                        costDesc = '各部门成本占比均未超40%，人均偏离度在合理范围内';
                    if (deptCostRatio > 40) {
                        costStatus = 'warn-red';
                        costIcon = '🔴';
                        costKeyword = maxDeptName + '成本占比' + deptCostRatio.toFixed(0) + '%';
                        costDesc = '超40%阈值，建议核查该部门人员编制与薪酬定位';
                    } else if (outlierDepts.length > 0) {
                        costStatus = 'warn-yellow';
                        costIcon = '⚠️';
                        costKeyword = outlierDepts.join('、') + '人均成本偏高';
                        costDesc = '较全公司均值偏离30%以上，建议核查职级与薪酬匹配度';
                    }

                    const deptFixedRatio = {};
                    deptNames.forEach(d => {
                        const emps = employees.filter(e => e.dept === d);
                        let f = 0,
                            fl = 0;
                        emps.forEach(e => { f += e.fixedPay;
                            fl += e.floatPay; });
                        deptFixedRatio[d] = (f + fl) > 0 ? (f / (f + fl) * 100) : 0;
                    });
                    let highFixedDepts = [];
                    deptNames.forEach(d => {
                        if (deptFixedRatio[d] > 80) highFixedDepts.push(d);
                    });

                    let structStatus = 'warn-green',
                        structIcon = '✅',
                        structKeyword = '结构健康',
                        structDesc = '固浮比' + formatRatio(fixedTotal, floatTotal) + '，各部门固定占比均在合理范围';
                    if (highFixedDepts.length > 0) {
                        structStatus = 'warn-red';
                        structIcon = '🔴';
                        structKeyword = highFixedDepts.join('、') + '固定薪酬占比超80%';
                        structDesc = '薪酬刚性过高，建议评估薪酬激励有效性';
                    }

                    const groupMap = {};
                    employees.forEach(e => {
                        const key = e.dept + '|' + e.type;
                        if (!groupMap[key]) groupMap[key] = [];
                        groupMap[key].push(e);
                    });
                    let inversionDetails = [];
                    Object.keys(groupMap).forEach(key => {
                        const group = groupMap[key];
                        if (group.length < 2) return;
                        const sorted = [...group].sort((a, b) => a.fixedPay - b.fixedPay);
                        const minPay = sorted[0].fixedPay;
                        const maxPay = sorted[sorted.length - 1].fixedPay;
                        if (maxPay > minPay * 1.3) {
                            const typeLevels = { 'A': 5, 'B': 4, 'C': 3, 'D': 2, '—': 1 };
                            for (let i = 0; i < sorted.length; i++) {
                                for (let j = i + 1; j < sorted.length; j++) {
                                    const levelA = typeLevels[sorted[i].type] || 0;
                                    const levelB = typeLevels[sorted[j].type] || 0;
                                    if (levelA < levelB && sorted[i].fixedPay > sorted[j].fixedPay * 1.15) {
                                        inversionDetails.push(
                                            `${sorted[i].name}(${sorted[i].type}) > ${sorted[j].name}(${sorted[j].type})`
                                            );
                                    }
                                }
                            }
                        }
                    });

                    let invStatus = 'warn-green',
                        invIcon = '✅',
                        invKeyword = '薪酬秩序正常',
                        invDesc = '同部门同岗位员工薪资分层合理，未发现薪酬倒挂现象';
                    if (inversionDetails.length > 0) {
                        invStatus = 'warn-yellow';
                        invIcon = '⚠️';
                        invKeyword = '发现' + inversionDetails.length + '例薪酬倒挂';
                        invDesc = inversionDetails.slice(0, 2).join('；') + (inversionDetails.length > 2 ? '等' : '') +
                            '，建议核查调薪与招聘定薪';
                    }

                    let abnormalCases = [];
                    employees.forEach(e => {
                        const totalFloat = e.floatPay;
                        if (totalFloat === 0) return;
                        const overtimeRatio = e.overtime / totalFloat * 100;
                        const subsidyRatio = (e.fullAttendance + e.travel + e.otherSubsidy) / totalFloat * 100;
                        const commissionRatio = e.commission / totalFloat * 100;
                        if (overtimeRatio > 50) abnormalCases.push(`${e.name}加班费${overtimeRatio.toFixed(0)}%`);
                        if (commissionRatio > 60) abnormalCases.push(`${e.name}提成${commissionRatio.toFixed(0)}%`);
                        if (subsidyRatio > 40) abnormalCases.push(`${e.name}补贴${subsidyRatio.toFixed(0)}%`);
                    });

                    let abnStatus = 'warn-green',
                        abnIcon = '✅',
                        abnKeyword = '浮动收入正常',
                        abnDesc = '加班费、补贴、提成占比均在合理范围内，无异常高额明细';
                    if (abnormalCases.length > 0) {
                        abnStatus = 'warn-yellow';
                        abnIcon = '⚠️';
                        abnKeyword = abnormalCases.length + '人浮动收入异常突出';
                        abnDesc = abnormalCases.slice(0, 2).join('；') + (abnormalCases.length > 2 ? '等' : '') +
                            '，建议核查排班与工时审批';
                    }

                    const alertGrid = document.getElementById('alertGrid');
                    alertGrid.innerHTML = `
                            <div class="warn-card ${costStatus}">
                                <div class="warn-header"><span>📊</span>部门成本集中度</div>
                                <div class="warn-content"><span class="${costStatus === 'warn-green' ? 'tip-pass' : costStatus === 'warn-yellow' ? 'tip-warning' : 'tip-danger'}">${costIcon}</span> ${costKeyword}，${costDesc}</div>
                            </div>
                            <div class="warn-card ${structStatus}">
                                <div class="warn-header"><span>⚖️</span>薪酬结构健康度</div>
                                <div class="warn-content"><span class="${structStatus === 'warn-green' ? 'tip-pass' : structStatus === 'warn-yellow' ? 'tip-warning' : 'tip-danger'}">${structIcon}</span> ${structKeyword}，${structDesc}</div>
                            </div>
                            <div class="warn-card ${invStatus}">
                                <div class="warn-header"><span>🔄</span>内部薪酬倒挂</div>
                                <div class="warn-content"><span class="${invStatus === 'warn-green' ? 'tip-pass' : invStatus === 'warn-yellow' ? 'tip-warning' : 'tip-danger'}">${invIcon}</span> ${invKeyword}，${invDesc}</div>
                            </div>
                            <div class="warn-card ${abnStatus}">
                                <div class="warn-header"><span>📋</span>异常高额明细</div>
                                <div class="warn-content"><span class="${abnStatus === 'warn-green' ? 'tip-pass' : abnStatus === 'warn-yellow' ? 'tip-warning' : 'tip-danger'}">${abnIcon}</span> ${abnKeyword}，${abnDesc}</div>
                            </div>
                        `;

                    // ============================================================
                    // 渲染图表
                    // ============================================================
                    setTimeout(() => {
                        renderCharts(employees, deptNames, deptSalaries, deptCounts, fixedTotal, floatTotal,
                            explicitCost, implicitCost, totalCost, totalSalary, totalSocialCompany,
                            totalFundCompany);
                    }, 50);

                } finally {
                    isRendering = false;
                }
            }

            // ============================================================
            // 图表渲染
            // ============================================================
            function renderCharts(employees, deptNames, deptSalaries, deptCounts, fixedTotal, floatTotal,
                explicitCost, implicitCost, totalCost, totalSalary, totalSocialCompany, totalFundCompany) {

                const chartConfigs = [
                    { id: 'chartCostStructure', key: 'chartCostStructure' },
                    { id: 'chartFixedFloat', key: 'chartFixedFloat' },
                    { id: 'chartDeptCost', key: 'chartDeptCost' },
                    { id: 'chartPerCapita', key: 'chartPerCapita' }
                ];

                chartConfigs.forEach(({ id, key }) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.innerHTML = '';
                    try {
                        const chart = echarts.init(el);
                        chartInstances[key] = chart;
                    } catch (e) {
                        console.error('Failed to init chart:', id, e);
                    }
                });

                const colors = ['#74b9ff', '#55efc4', '#fdcb6e', '#a29bfe', '#ff7675', '#00b894', '#fd79a8'];

                // ===== 1. 成本结构饼图 =====
                if (chartInstances['chartCostStructure']) {
                    const chart = chartInstances['chartCostStructure'];
                    chart.setOption({
                        tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                        color: ['#74b9ff', '#55efc4', '#fdcb6e'],
                        legend: { bottom: 10 },
                        series: [{
                            type: 'pie',
                            radius: ['40%', '70%'],
                            data: [
                                { name: '应发工资', value: Math.round(totalSalary) },
                                { name: '公司社保', value: Math.round(totalSocialCompany) },
                                { name: '公司公积金', value: Math.round(totalFundCompany) }
                            ],
                            animationDuration: 1200,
                            animationEasing: 'elasticOut',
                            label: { formatter: '{b}\n¥{c}', fontSize: 11 }
                        }]
                    });
                    chart.off('click');
                    chart.on('click', function(params) {
                        openCostTotalDetail(currentEmployees, currentEmployees.length, totalCost, totalSalary,
                            totalSocialCompany, totalFundCompany);
                    });
                }

                // ===== 2. 固定vs浮动柱状图 =====
                if (chartInstances['chartFixedFloat']) {
                    const chart = chartInstances['chartFixedFloat'];
                    chart.setOption({
                        color: ['#74b9ff', '#55efc4'],
                        tooltip: { trigger: 'axis', formatter: '{b}: ¥{c}' },
                        xAxis: { type: 'category', data: ['固定薪酬', '浮动薪酬'] },
                        yAxis: { type: 'value', formatter: '¥{value}' },
                        series: [{
                            type: 'bar',
                            data: [Math.round(fixedTotal), Math.round(floatTotal)],
                            barWidth: '50%',
                            animationDuration: 1300,
                            animationEasing: 'elasticOut',
                            label: { show: true, position: 'top', formatter: '¥{c}', fontSize: 11 }
                        }]
                    });
                    chart.off('click');
                    chart.on('click', function(params) {
                        const isFixed = params.name === '固定薪酬';
                        const title = isFixed ? '⚖️ 固定薪酬明细' : '⚖️ 浮动薪酬明细';
                        const empList = isFixed ? currentEmployees.filter(e => e.fixedPay > 0) : currentEmployees
                            .filter(e => e.floatPay > 0);
                        const total = isFixed ? fixedTotal : floatTotal;
                        const scenario = isFixed ? 'fixedPay' : 'floatPay';
                        const columns = getColumnsForScenario(scenario);
                        openModalWithColumns(title, empList, `总额 ${formatCurrency(total)}，共 ${empList.length} 人`,
                            columns);
                    });
                }

                // ===== 3. 部门双轴图 =====
                if (chartInstances['chartDeptCost']) {
                    const chart = chartInstances['chartDeptCost'];
                    chart.setOption({
                        tooltip: {
                            trigger: 'axis',
                            formatter: function(params) {
                                const idx = params[0].dataIndex;
                                const dept = deptNames[idx];
                                return `<strong>${dept}</strong><br/>人数: ${deptCounts[idx]} 人<br/>应发工资: ${formatCurrency(deptSalaries[idx])}`;
                            }
                        },
                        legend: { data: ['人数', '应发工资'], bottom: 10 },
                        xAxis: { type: 'category', data: deptNames, axisLabel: { rotate: 30 } },
                        yAxis: [
                            { name: '人数', nameTextStyle: { fontSize: 11 } },
                            { name: '应发工资', position: 'right', nameTextStyle: { fontSize: 11 } }
                        ],
                        series: [{
                            name: '人数',
                            type: 'bar',
                            yAxisIndex: 0,
                            data: deptCounts,
                            color: '#74b9ff',
                            animationDuration: 1200
                        }, {
                            name: '应发工资',
                            type: 'line',
                            yAxisIndex: 1,
                            data: deptSalaries,
                            color: '#fdcb6e',
                            animationDuration: 1400,
                            smooth: true,
                            symbolSize: 8,
                            lineStyle: { width: 3 }
                        }]
                    });
                    chart.off('click');
                    chart.on('click', function(params) {
                        const dept = params.name;
                        if (!dept) return;
                        const empList = currentEmployees.filter(e => e.dept === dept);
                        const salary = deptSalaries[deptNames.indexOf(dept)] || 0;
                        const columns = getColumnsForScenario('full');
                        const dataWithTotal = empList.map(e => ({
                            ...e,
                            totalCost: e.salary + e.socialCompany + e.fundCompany
                        }));
                        openModalWithColumns(`🏢 ${dept} 薪资明细`, dataWithTotal,
                            `部门应发总额 ${formatCurrency(salary)}，${empList.length} 人`, columns);
                    });
                }

                // ===== 4. 岗位类型饼图 =====
                if (chartInstances['chartPerCapita']) {
                    const chart = chartInstances['chartPerCapita'];
                    let postTypeData = currentPostTypeData.length > 0 ? currentPostTypeData : [];

                    if (postTypeData.length === 0) {
                        postTypeData = [{ name: '暂无数据', value: 1 }];
                    }

                    chart.setOption({
                        color: colors,
                        tooltip: {
                            trigger: 'item',
                            formatter: function(params) {
                                if (params.name === '暂无数据') return '暂无数据';
                                return `${params.name}: ¥${params.value.toFixed(2)} (${params.percent}%)`;
                            }
                        },
                        legend: {
                            bottom: 10,
                            textStyle: { fontSize: 11 }
                        },
                        series: [{
                            type: 'pie',
                            radius: ['40%', '70%'],
                            data: postTypeData,
                            animationDuration: 1200,
                            animationEasing: 'elasticOut',
                            label: {
                                formatter: function(params) {
                                    if (params.name === '暂无数据') return '暂无数据';
                                    return params.name + '\n¥' + params.value.toFixed(0);
                                },
                                fontSize: 10
                            },
                            itemStyle: {
                                borderRadius: 4,
                                borderColor: '#fff',
                                borderWidth: 2
                            }
                        }]
                    });

                    chart.off('click');
                    chart.on('click', function(params) {
                        const type = params.name;
                        if (type === '暂无数据') return;
                        const empList = currentEmployees.filter(e => e.type === type);
                        const total = empList.reduce((s, e) => s + e.salary, 0);
                        const columns = getColumnsForScenario('full');
                        openModalWithColumns(`👤 ${type} 岗位薪资明细`, empList,
                            `${empList.length} 人，应发总额 ${formatCurrency(total)}`, columns);
                    });
                }

                if (resizeHandler) { window.removeEventListener('resize', resizeHandler); }
                resizeHandler = function() {
                    Object.values(chartInstances).forEach(c => {
                        try { if (c) c.resize(); } catch (e) { /* ignore */ }
                    });
                };
                window.addEventListener('resize', resizeHandler);
                setTimeout(() => {
                    Object.values(chartInstances).forEach(c => {
                        try { if (c) c.resize(); } catch (e) { /* ignore */ }
                    });
                }, 100);
            }
