<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人力成本分析系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
        body { background:#f5f7fa; display:flex; min-height:100vh; }
        .sidebar { position:fixed; left:0; top:0; width:200px; height:100vh; background:#fff; border-right:1px solid #e5e7eb; padding:24px 12px; }
        .sidebar .logo { font-size:18px; font-weight:700; text-align:center; padding-bottom:20px; border-bottom:1px solid #e5e7eb; margin-bottom:16px; }
        .sidebar nav a { display:block; padding:10px 14px; border-radius:8px; color:#4b5563; text-decoration:none; font-size:0.85rem; font-weight:500; cursor:pointer; margin-bottom:4px; }
        .sidebar nav a:hover { background:#f5f7fa; }
        .sidebar nav a.active { background:#e8f0fe; color:#3b82f6; font-weight:600; }
        .main { margin-left:200px; flex:1; padding:24px 28px; }
        .page { display:none; }
        .page.active { display:block; }
        .upload-area { display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:#fff; padding:16px 20px; border-radius:10px; border:1px solid #e5e7eb; margin-bottom:20px; }
        .btn { padding:6px 18px; border-radius:40px; font-size:0.78rem; font-weight:500; border:none; cursor:pointer; background:#f5f7fa; color:#4b5563; transition:0.2s; }
        .btn-primary { background:#3b82f6; color:#fff; }
        .btn-primary:hover { background:#2563eb; }
        .btn-danger { background:#fef2f2; color:#ef4444; }
        .btn-danger:hover { background:#fee2e2; }
        .file-info { font-size:0.75rem; color:#9ca3af; background:#f5f7fa; padding:4px 14px; border-radius:40px; border:1px solid #e5e7eb; }
        .file-info.loaded { background:#ecfdf5; border-color:#a7f3d0; color:#10b981; }
        .card-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:20px; }
        .card { background:#fff; border-radius:10px; padding:16px 20px; border:1px solid #e5e7eb; }
        .card .label { font-size:0.65rem; color:#9ca3af; text-transform:uppercase; }
        .card .value { font-size:26px; font-weight:700; color:#1a1a2e; margin-top:2px; }
        .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
        .chart-box { background:#fff; border-radius:10px; padding:12px 14px 8px; border:1px solid #e5e7eb; }
        .chart-box .title { font-size:13px; font-weight:600; display:flex; justify-content:space-between; margin-bottom:4px; }
        .chart-box .title .tag { font-size:0.5rem; background:#f5f7fa; color:#9ca3af; padding:2px 10px; border-radius:20px; font-weight:400; }
        .chart-container { width:100%; height:220px; }
        .chart-full { grid-column:1/-1; }
        .insight { font-size:0.6rem; color:#9ca3af; background:#f5f7fa; padding:2px 12px; border-radius:12px; margin-top:4px; display:inline-block; }
        .data-list { background:#fff; border-radius:10px; border:1px solid #e5e7eb; padding:8px 0; margin-top:12px; }
        .data-item { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; border-bottom:1px solid #f3f4f6; }
        .data-item:last-child { border-bottom:none; }
        .footer { text-align:right; margin-top:16px; color:#9ca3af; font-size:0.65rem; border-top:1px solid #e5e7eb; padding-top:8px; }
        @media (max-width:768px) {
            .sidebar { width:60px; padding:16px 8px; }
            .sidebar .logo { font-size:0; }
            .sidebar nav a { justify-content:center; padding:10px; }
            .sidebar nav a span { display:none; }
            .main { margin-left:60px; padding:16px; }
            .chart-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">📊 成本</div>
    <nav>
        <a class="active" data-page="monthly">📅 当月分析</a>
        <a data-page="trend">📈 多月趋势</a>
    </nav>
</div>
<div class="main">
    <div class="upload-area">
        <button class="btn btn-primary" id="uploadBtn">📤 上传 Excel</button>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
        <button class="btn" id="templateBtn">📄 下载模板</button>
        <span class="file-info" id="fileInfo">未上传</span>
        <span style="font-size:0.7rem;color:#9ca3af;margin-left:auto;" id="monthCount"></span>
    </div>
    <div class="page active" id="page-monthly">
        <h2 style="font-size:20px;margin-bottom:4px;">📅 当月数据分析</h2>
        <p style="color:#9ca3af;font-size:0.8rem;margin-bottom:16px;" id="monthlySub">请上传数据</p>
        <div class="card-grid" id="monthlyKPI"></div>
        <div class="chart-grid">
            <div class="chart-box"><div class="title">📊 成本构成 <span class="tag">环形图</span></div><div class="chart-container" id="chartDonut"></div><span class="insight" id="insightDonut">💡 洞察</span></div>
            <div class="chart-box"><div class="title">🏢 部门成本对比 <span class="tag">柱状图</span></div><div class="chart-container" id="chartDept"></div><span class="insight" id="insightDept">💡 洞察</span></div>
            <div class="chart-box chart-full"><div class="title">👤 岗位成本排行 <span class="tag">横向柱状图</span></div><div class="chart-container" id="chartJob"></div><span class="insight" id="insightJob">💡 洞察</span></div>
        </div>
        <div style="margin-top:12px;">
            <h3 style="font-size:0.85rem;font-weight:600;color:#4b5563;">📂 已上传月份</h3>
            <div class="data-list" id="dataList"><div style="text-align:center;color:#9ca3af;padding:16px;">暂无数据</div></div>
        </div>
        <div class="footer">数据来源：<span id="monthlySource">—</span></div>
    </div>
    <div class="page" id="page-trend">
        <h2 style="font-size:20px;margin-bottom:4px;">📈 多月趋势分析</h2>
        <p style="color:#9ca3af;font-size:0.8rem;margin-bottom:16px;">跨月成本趋势与变化</p>
        <div class="card-grid" id="trendKPI"></div>
        <div class="chart-box">
            <div class="title">📈 总成本趋势 <span class="tag">折线图</span></div>
            <div class="chart-container" style="height:280px;" id="chartTrend"></div>
            <span class="insight" id="insightTrend">💡 洞察</span>
        </div>
        <div class="footer">数据来源：<span id="trendSource">—</span></div>
    </div>
</div>
<script>
    (function() {
        'use strict';

        function log(msg) { console.log('[系统] ' + msg); }

        function formatCurrency(v) {
            if (v == null || isNaN(v)) return '¥0.00';
            return '¥' + Number(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function formatMonthLabel(key) {
            if (!key) return '';
            var parts = key.split('-');
            if (parts.length !== 2) return key;
            return parts[0] + '年' + parseInt(parts[1]) + '月';
        }

        function sum(arr, key) {
            return arr.reduce(function(t, i) { return t + (i[key] || 0); }, 0);
        }

        function avg(arr) {
            if (!arr || arr.length === 0) return 0;
            return arr.reduce(function(a, b) { return a + b; }, 0) / arr.length;
        }

        function groupBy(arr, key) {
            var result = {};
            arr.forEach(function(item) {
                var k = item[key] || '未分类';
                if (!result[k]) result[k] = [];
                result[k].push(item);
            });
            return result;
        }

        // ===== DataStore =====
        var DataStore = {
            _data: {},
            init: function() {
                try {
                    var stored = localStorage.getItem('salaryDataSimple');
                    if (stored) {
                        var parsed = JSON.parse(stored);
                        if (parsed && typeof parsed === 'object') this._data = parsed;
                        log('加载数据成功');
                    }
                } catch (e) { log('加载数据失败: ' + e.message); }
                return this;
            },
            getMonths: function() { return Object.keys(this._data).sort(); },
            getEmployees: function(month) { return this._data[month] || []; },
            setEmployees: function(month, employees) {
                this._data[month] = employees;
                this._save();
                log('保存 ' + month + ' ' + employees.length + '人');
            },
            deleteMonth: function(month) {
                delete this._data[month];
                this._save();
                log('删除 ' + month);
            },
            _save: function() {
                try { localStorage.setItem('salaryDataSimple', JSON.stringify(this._data)); } catch (e) { log(
                        '保存失败: ' + e.message); }
            }
        };
        DataStore.init();

        // ===== 统计 =====
        var Stats = {
            getMonthStats: function(month) {
                var emps = DataStore.getEmployees(month);
                if (!emps || emps.length === 0) return null;
                var totalCost = sum(emps, 'totalCost');
                var totalSalary = sum(emps, 'grossPay');
                var salaries = emps.map(function(e) { return e.grossPay || 0; }).filter(function(v) { return v > 0; });
                return {
                    count: emps.length,
                    totalCost: totalCost,
                    totalSalary: totalSalary,
                    totalSocial: sum(emps, 'socialCompany'),
                    totalFund: sum(emps, 'fundCompany'),
                    avgCost: totalCost / emps.length,
                    maxSalary: salaries.length ? Math.max.apply(null, salaries) : 0,
                    employees: emps
                };
            },
            getMultiStats: function(months) {
                var valid = months.filter(function(m) { return DataStore.getEmployees(m).length > 0; });
                if (valid.length === 0) return null;
                var allEmps = [],
                    monthStats = {};
                valid.forEach(function(m) {
                    var emps = DataStore.getEmployees(m);
                    if (emps.length) {
                        allEmps.push.apply(allEmps, emps);
                        monthStats[m] = { totalCost: sum(emps, 'totalCost'), count: emps.length };
                    }
                });
                return {
                    monthStats: monthStats,
                    totalCost: sum(allEmps, 'totalCost'),
                    count: allEmps.length,
                    avgCost: allEmps.length ? sum(allEmps, 'totalCost') / allEmps.length : 0,
                    validMonths: valid
                };
            }
        };

        // ===== 图表 =====
        var charts = {};

        function registerChart(containerId, option, key) {
            var container = document.getElementById(containerId);
            if (!container) return;
            if (charts[key]) { try { charts[key].dispose(); } catch (e) {} delete charts[key]; }
            try {
                container.innerHTML = '';
                var chart = echarts.init(container);
                chart.setOption(option);
                charts[key] = chart;
                log('图表注册: ' + key);
            } catch (e) { log('图表注册失败: ' + key); }
        }

        function resizeCharts() {
            Object.keys(charts).forEach(function(k) {
                try { if (charts[k]) charts[k].resize(); } catch (e) {}
            });
        }

        // ===== 页面渲染 =====
        function renderMonthly() {
            var months = DataStore.getMonths();
            var subEl = document.getElementById('monthlySub');
            var sourceEl = document.getElementById('monthlySource');
            if (months.length === 0) {
                document.getElementById('monthlyKPI').innerHTML = '';
                ['chartDonut', 'chartDept', 'chartJob'].forEach(function(id) {
                    document.getElementById(id).innerHTML = '<div style="text-align:center;color:#9ca3af;padding:30px 0;">暂无数据</div>';
                });
                subEl.textContent = '请上传数据';
                sourceEl.textContent = '—';
                return;
            }
            var latest = months[months.length - 1];
            var stats = Stats.getMonthStats(latest);
            if (!stats) return;
            subEl.textContent = formatMonthLabel(latest) + ' 详细分析';
            sourceEl.textContent = formatMonthLabel(latest) + ' (' + stats.count + '人)';

            document.getElementById('monthlyKPI').innerHTML = `
                <div class="card"><div class="label">💰 总成本</div><div class="value">${formatCurrency(stats.totalCost)}</div></div>
                <div class="card"><div class="label">👥 人数</div><div class="value">${stats.count}</div></div>
                <div class="card"><div class="label">📊 人均成本</div><div class="value">${formatCurrency(stats.avgCost)}</div></div>
                <div class="card"><div class="label">📈 最高薪资</div><div class="value">${formatCurrency(stats.maxSalary)}</div></div>
            `;

            var totalSalary = stats.totalSalary,
                totalSocial = stats.totalSocial,
                totalFund = stats.totalFund;
            var donutData = [
                { name: '应发工资', value: Math.round(totalSalary) },
                { name: '公司社保', value: Math.round(totalSocial) },
                { name: '公司公积金', value: Math.round(totalFund) }
            ].filter(function(d) { return d.value > 0; });
            if (donutData.length) {
                var donutOpt = {
                    tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                    color: ['#3B82F6', '#10B981', '#06B6D4'],
                    legend: { bottom: 5, itemWidth: 10, itemHeight: 10 },
                    series: [{ type: 'pie', radius: ['45%', '70%'], data: donutData, label: { formatter: '{b}\n¥{c}',
                            fontSize: 10 } }]
                };
                registerChart('chartDonut', donutOpt, 'donut');
                var total = totalSalary + totalSocial + totalFund;
                document.getElementById('insightDonut').textContent = '💡 总成本 ' + formatCurrency(total) +
                    '，应发占比 ' + (totalSalary/total*100).toFixed(1) + '%';
            }

            var deptMap = groupBy(stats.employees, 'dept');
            var deptData = Object.keys(deptMap).map(function(d) {
                return { name: d, value: Math.round(sum(deptMap[d], 'totalCost')) };
            }).sort(function(a, b) { return b.value - a.value; });
            if (deptData.length) {
                var deptOpt = {
                    tooltip: { trigger: 'axis' },
                    grid: { left: '10%', right: '6%', top: 16, bottom: 30 },
                    xAxis: { type: 'category', data: deptData.map(function(d) { return d.name; }),
                    axisLabel: { rotate: 20, fontSize: 9 } },
                    yAxis: { type: 'value', name: '总成本 (¥)', axisLabel: { fontSize: 9,
                            formatter: function(v) { return v >= 10000 ? (v/10000)+'万' : v; } } },
                    series: [{ type: 'bar', data: deptData.map(function(d) { return d.value; }),
                        itemStyle: { color: '#3B82F6', borderRadius: [4,4,0,0] }, barWidth: '40%' }]
                };
                registerChart('chartDept', deptOpt, 'dept');
                var top = deptData[0];
                document.getElementById('insightDept').textContent = '💡 部门 ' + top.name + ' 成本最高，为 ' +
                    formatCurrency(top.value);
            }

            var jobMap = groupBy(stats.employees, 'postType');
            var jobData = Object.keys(jobMap).map(function(j) {
                return { name: j, value: Math.round(sum(jobMap[j], 'totalCost')) };
            }).sort(function(a, b) { return b.value - a.value; });
            if (jobData.length) {
                var jobOpt = {
                    tooltip: { trigger: 'axis' },
                    grid: { left: '20%', right: '8%', top: 16, bottom: 20 },
                    xAxis: { type: 'value', name: '总成本 (¥)', axisLabel: { fontSize: 9,
                            formatter: function(v) { return v >= 10000 ? (v/10000)+'万' : v; } } },
                    yAxis: { type: 'category', data: jobData.map(function(d) { return d.name; }),
                    axisLabel: { fontSize: 9 } },
                    series: [{ type: 'bar', data: jobData.map(function(d) { return d.value; }),
                        itemStyle: { color: '#8B5CF6', borderRadius: [0,4,4,0] }, barWidth: '35%' }]
                };
                registerChart('chartJob', jobOpt, 'job');
                var topJob = jobData[0];
                document.getElementById('insightJob').textContent = '💡 岗位 ' + topJob.name + ' 成本最高，为 ' +
                    formatCurrency(topJob.value);
            }
            renderDataList();
        }

        function renderTrend() {
            var months = DataStore.getMonths();
            var sourceEl = document.getElementById('trendSource');
            if (months.length === 0) {
                document.getElementById('trendKPI').innerHTML = '';
                document.getElementById('chartTrend').innerHTML = '<div style="text-align:center;color:#9ca3af;padding:30px 0;">暂无数据</div>';
                document.getElementById('insightTrend').textContent = '💡 请上传至少2个月的数据';
                sourceEl.textContent = '—';
                return;
            }
            var multi = Stats.getMultiStats(months);
            if (!multi || Object.keys(multi.monthStats).length < 2) {
                document.getElementById('trendKPI').innerHTML =
                    '<div class="card"><div class="label">📊 月份数</div><div class="value">' + months.length +
                    '</div><div class="sub">需要至少2个月有数据</div></div>';
                document.getElementById('chartTrend').innerHTML = '<div style="text-align:center;color:#9ca3af;padding:30px 0;">至少需要2个月数据</div>';
                document.getElementById('insightTrend').textContent = '💡 请上传更多月份数据';
                sourceEl.textContent = months.map(function(m) { return formatMonthLabel(m); }).join('、');
                return;
            }
            var totalCost = multi.totalCost,
                avgCost = multi.avgCost,
                count = multi.count;
            document.getElementById('trendKPI').innerHTML = `
                <div class="card"><div class="label">📊 总月份</div><div class="value">${Object.keys(multi.monthStats).length}</div></div>
                <div class="card"><div class="label">💰 总成本（汇总）</div><div class="value">${formatCurrency(totalCost)}</div></div>
                <div class="card"><div class="label">📈 人均成本（平均）</div><div class="value">${formatCurrency(avgCost)}</div></div>
                <div class="card"><div class="label">👥 总人次</div><div class="value">${count}</div></div>
            `;
            var sorted = Object.keys(multi.monthStats).sort();
            var trendData = sorted.map(function(m) {
                return { name: formatMonthLabel(m), value: Math.round(multi.monthStats[m].totalCost) };
            });
            var trendOpt = {
                tooltip: { trigger: 'axis' },
                grid: { left: '8%', right: '6%', top: 16, bottom: 30 },
                xAxis: { type: 'category', data: trendData.map(function(d) { return d.name; }),
                axisLabel: { fontSize: 9 } },
                yAxis: { type: 'value', name: '总成本 (¥)', axisLabel: { fontSize: 9,
                        formatter: function(v) { return v >= 10000 ? (v/10000)+'万' : v; } } },
                series: [{
                    type: 'line',
                    data: trendData.map(function(d) { return d.value; }),
                    smooth: true,
                    lineStyle: { width: 3, color: '#3B82F6' },
                    areaStyle: {
                        color: {
                            type: 'linear',
                            x: 0,
                            y: 0,
                            x2: 0,
                            y2: 1,
                            colorStops: [{ offset: 0, color: 'rgba(59,130,246,0.3)' },
                            { offset: 1, color: 'rgba(59,130,246,0.02)' }]
                        }
                    },
                    symbol: 'circle',
                    symbolSize: 6
                }]
            };
            registerChart('chartTrend', trendOpt, 'trend');
            var firstVal = trendData[0].value,
                lastVal = trendData[trendData.length - 1].value;
            var changePct = firstVal > 0 ? ((lastVal - firstVal) / firstVal * 100) : 0;
            var direction = changePct >= 0 ? '上升' : '下降';
            document.getElementById('insightTrend').textContent = '💡 从 ' + trendData[0].name + ' 到 ' + trendData[
                trendData.length - 1].name + '，总成本' + direction + ' ' + Math.abs(changePct).toFixed(1) + '%';
            sourceEl.textContent = sorted.map(function(m) { return formatMonthLabel(m); }).join('、');
        }

        function renderDataList() {
            var container = document.getElementById('dataList');
            var months = DataStore.getMonths();
            document.getElementById('monthCount').textContent = months.length ? '共 ' + months.length + ' 个月份' : '';
            if (months.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:16px;">暂无数据</div>';
                return;
            }
            var html = '';
            months.forEach(function(m) {
                var count = DataStore.getEmployees(m).length;
                html += '<div class="data-item"><span class="info">' + formatMonthLabel(m) +
                    '</span><span class="meta">' + count +
                    ' 人</span><button class="btn btn-danger" style="padding:2px 12px;font-size:0.65rem;" data-month="' +
                    m + '">删除</button></div>';
            });
            container.innerHTML = html;
            container.querySelectorAll('[data-month]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var month = this.dataset.month;
                    if (confirm('确定要删除 ' + formatMonthLabel(month) + ' 的数据吗？')) {
                        DataStore.deleteMonth(month);
                        renderMonthly();
                        renderTrend();
                        updateFileInfo();
                    }
                });
            });
        }

        function updateFileInfo() {
            var months = DataStore.getMonths();
            var info = document.getElementById('fileInfo');
            if (months.length === 0) {
                info.textContent = '未上传';
                info.className = 'file-info';
            } else {
                var latest = months[months.length - 1];
                var count = DataStore.getEmployees(latest).length;
                info.textContent = '📊 ' + formatMonthLabel(latest) + ' (' + count + '人)';
                info.className = 'file-info loaded';
            }
        }

        // ================================================================
        //  上传逻辑：支持你的中文表头
        // ================================================================
        function setupUpload() {
            var uploadBtn = document.getElementById('uploadBtn');
            var fileInput = document.getElementById('fileInput');
            var templateBtn = document.getElementById('templateBtn');

            uploadBtn.addEventListener('click', function() { fileInput.click(); });

            fileInput.addEventListener('change', function(e) {
                var files = this.files;
                if (!files || !files.length) return;

                var reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        var data = new Uint8Array(ev.target.result);
                        var workbook = XLSX.read(data, { type: 'array' });
                        var firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        var json = XLSX.utils.sheet_to_json(firstSheet);

                        if (json.length === 0) { alert('文件为空'); return; }

                        // 获取所有列名
                        var firstRow = json[0];
                        var colNames = Object.keys(firstRow);
                        log('找到列: ' + colNames.join(', '));

                        // 解析每行数据
                        var employees = json.map(function(row) {
                            // 提取姓名
                            var name = row['姓名'] || row['name'] || '';
                            if (!name) {
                                // 尝试找任何包含"姓名"的列
                                for (var key in row) {
                                    if (key.indexOf('姓名') >= 0 || key.indexOf('name') >= 0) {
                                        name = row[key];
                                        break;
                                    }
                                }
                            }

                            // 提取部门
                            var dept = row['部门'] || row['dept'] || '';
                            if (!dept) {
                                for (var key in row) {
                                    if (key.indexOf('部门') >= 0 || key.indexOf('dept') >= 0) {
                                        dept = row[key];
                                        break;
                                    }
                                }
                            }

                            // 提取岗位
                            var post = row['岗位'] || row['post'] || '';

                            // 提取岗位类型
                            var postType = row['岗位类型'] || row['postType'] || '';

                            // 提取职级
                            var grade = row['职级'] || row['grade'] || '';

                            // ----- 计算应发工资（grossPay）-----
                            // 方式1：如果有"应发工资"列，直接使用
                            var grossPay = parseFloat(row['应发工资'] || row['grossPay'] || 0);

                            // 方式2：如果没有，尝试从"基本工资+绩效工资+各种补贴"计算
                            if (!grossPay || grossPay === 0) {
                                var baseSalary = parseFloat(row['基本工资'] || row['baseSalary'] || 0);
                                var performance = parseFloat(row['绩效工资'] || row['performance'] || 0);
                                // 补贴
                                var fullAttendance = parseFloat(row['全勤补贴'] || 0);
                                var overtime = parseFloat(row['加班补贴'] || row['加三补贴'] || 0);
                                var travel = parseFloat(row['出差补贴'] || 0);
                                var other = parseFloat(row['其他补贴'] || 0);
                                // 小计（如果有的话）
                                var subtotal = parseFloat(row['小计'] || row['应发合计'] || 0);

                                // 尝试从"加项小计"获取
                                if (!subtotal) {
                                    // 查找"小计"相关列
                                    for (var key in row) {
                                        if (key.indexOf('小计') >= 0 || key.indexOf('应发') >= 0) {
                                            subtotal = parseFloat(row[key]) || 0;
                                            break;
                                        }
                                    }
                                }

                                grossPay = baseSalary + performance + fullAttendance + overtime + travel + other +
                                    subtotal;
                                // 如果算出来是0，尝试直接用"应发工资"列
                                if (grossPay === 0) {
                                    // 查找任何包含"应发"或"小计"的列
                                    for (var key in row) {
                                        if (key.indexOf('应发') >= 0 || key.indexOf('小计') >= 0) {
                                            grossPay = parseFloat(row[key]) || 0;
                                            break;
                                        }
                                    }
                                }
                            }

                            // ----- 固定薪酬（fixedPay）-----
                            var fixedPay = parseFloat(row['固定薪酬'] || row['fixedPay'] || 0);
                            if (!fixedPay || fixedPay === 0) {
                                fixedPay = parseFloat(row['基本工资'] || 0);
                            }

                            // ----- 浮动薪酬（floatPay）-----
                            var floatPay = parseFloat(row['浮动薪酬'] || row['floatPay'] || 0);
                            if (!floatPay || floatPay === 0) {
                                floatPay = parseFloat(row['绩效工资'] || 0);
                            }

                            // ----- 公司社保（socialCompany）-----
                            var socialCompany = parseFloat(row['社保(公司部分)'] || row['社保（公司部分）'] || row[
                                '社保(公司部2)'] || row['socialCompany'] || 0);
                            if (!socialCompany || socialCompany === 0) {
                                // 尝试找社保相关列
                                for (var key in row) {
                                    if (key.indexOf('社保') >= 0 && (key.indexOf('公司') >= 0 || key.indexOf(
                                        '单位') >= 0)) {
                                        socialCompany = parseFloat(row[key]) || 0;
                                        break;
                                    }
                                }
                            }

                            // ----- 公司公积金（fundCompany）-----
                            var fundCompany = parseFloat(row['公积金(公司部分)'] || row['公积金（公司部分）'] || row[
                                '公积金(公司部2)'] || row['fundCompany'] || 0);
                            if (!fundCompany || fundCompany === 0) {
                                for (var key in row) {
                                    if (key.indexOf('公积金') >= 0 && (key.indexOf('公司') >= 0 || key.indexOf(
                                        '单位') >= 0)) {
                                        fundCompany = parseFloat(row[key]) || 0;
                                        break;
                                    }
                                }
                            }

                            // ----- 司龄（tenureYears）-----
                            var tenureYears = parseFloat(row['司龄'] || row['tenureYears'] || 0);
                            if (!tenureYears || tenureYears === 0) {
                                for (var key in row) {
                                    if (key.indexOf('司龄') >= 0 || key.indexOf('入职年限') >= 0) {
                                        tenureYears = parseFloat(row[key]) || 0;
                                        break;
                                    }
                                }
                            }

                            // 计算总成本
                            var totalCost = grossPay + socialCompany + fundCompany;

                            // 如果总成本还是0，尝试从"总成本"列读取
                            if (totalCost === 0) {
                                totalCost = parseFloat(row['总成本'] || row['totalCost'] || 0);
                            }

                            return {
                                name: name || '未知',
                                dept: dept || '未知部门',
                                post: post || '',
                                postType: postType || '',
                                grade: grade || '',
                                grossPay: grossPay,
                                fixedPay: fixedPay,
                                floatPay: floatPay,
                                socialCompany: socialCompany,
                                fundCompany: fundCompany,
                                tenureYears: tenureYears,
                                totalCost: totalCost
                            };
                        });

                        // 过滤掉无效数据（没有姓名和成本都为0的）
                        var validEmployees = employees.filter(function(e) {
                            return e.name && e.name !== '未知' && e.totalCost > 0;
                        });

                        if (validEmployees.length === 0) {
                            alert('未能解析到有效数据，请检查表头格式是否正确。');
                            log('解析到 ' + employees.length + ' 条记录，但都无效');
                            return;
                        }

                        // 识别月份
                        var monthKey = '';
                        if (json[0]['月份'] || json[0]['month']) {
                            monthKey = json[0]['月份'] || json[0]['month'];
                        } else {
                            var fileName = files[0].name;
                            var match = fileName.match(/(\d{4}-\d{2})/);
                            if (match) monthKey = match[1];
                            else monthKey = new Date().toISOString().slice(0, 7);
                        }

                        // 检查是否已有该月份数据
                        var existing = DataStore.getEmployees(monthKey);
                        if (existing && existing.length > 0) {
                            if (!confirm('月份 ' + formatMonthLabel(monthKey) + ' 已有数据，是否覆盖？')) {
                                return;
                            }
                        }

                        DataStore.setEmployees(monthKey, validEmployees);
                        alert('✅ 上传成功！' + formatMonthLabel(monthKey) + ' 共 ' + validEmployees.length + ' 人');
                        log('上传成功: ' + monthKey + ', ' + validEmployees.length + '人');

                        renderMonthly();
                        renderTrend();
                        updateFileInfo();

                    } catch (err) {
                        alert('❌ 解析失败：' + err.message);
                        log('上传错误: ' + err.stack);
                    }
                };
                reader.readAsArrayBuffer(files[0]);
                this.value = '';
            });

            // 下载模板（中文表头，符合你的格式）
            templateBtn.addEventListener('click', function() {
                var template = [
                    ['姓名', '部门', '岗位', '岗位类型', '职级', '基本工资', '绩效工资', '全勤补贴', '加班补贴', '出差补贴',
                        '其他补贴', '应发合计', '社保(公司部分)', '公积金(公司部分)', '司龄'
                    ],
                    ['张三', '技术部', '工程师', '技术', 'P6', 20000, 5000, 500, 0, 0, 0, 25500, 5000, 2500,
                        3.5
                    ],
                    ['李四', '市场部', '经理', '管理', 'M3', 24000, 6000, 500, 0, 0, 0, 30500, 6000, 3000,
                        5.0
                    ]
                ];
                var wb = XLSX.utils.book_new();
                var ws = XLSX.utils.aoa_to_sheet(template);
                XLSX.utils.book_append_sheet(wb, ws, '工资表');
                var wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                var blob = new Blob([wbout], { type: 'application/octet-stream' });
                var link = document.createElement('a');
                link.download = '工资表模板_中文.xlsx';
                link.href = URL.createObjectURL(blob);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(function() { URL.revokeObjectURL(link.href); }, 100);
            });
        }

        // ===== 导航 =====
        function setupNavigation() {
            document.querySelectorAll('.sidebar nav a').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var page = this.dataset.page;
                    document.querySelectorAll('.sidebar nav a').forEach(function(a) { a.classList.remove(
                        'active'); });
                    this.classList.add('active');
                    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
                    var target = document.getElementById('page-' + page);
                    if (target) target.classList.add('active');
                    if (page === 'monthly') renderMonthly();
                    else if (page === 'trend') renderTrend();
                    setTimeout(resizeCharts, 200);
                });
            });
        }

        // ===== 初始化 =====
        function init() {
            setupUpload();
            setupNavigation();
            renderMonthly();
            renderTrend();
            updateFileInfo();
            setTimeout(resizeCharts, 300);
            log('🚀 系统启动完成！');
            log('📌 支持中文表头：姓名、部门、基本工资、绩效工资、社保(公司部分)、公积金(公司部分)等');
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        window.__debug = { DataStore: DataStore, Stats: Stats, charts: charts, resizeCharts: resizeCharts };
    })();
</script>
</body>
</html>
